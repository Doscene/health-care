const sections=[
  {key:'all',label:'全部'},
  {key:'login',label:'登录注册'},
  {key:'elderly',label:'老人端'},
  {key:'young',label:'年轻患者'},

  {key:'family',label:'家庭圈'},

  {key:'profile',label:'个人中心'},
  {key:'report',label:'健康报告'},
  {key:'alert',label:'异常预警'}
];

const navEl=document.getElementById('nav');
const gridEl=document.getElementById('grid');

// 渲染导航
sections.forEach(s=>{
  const btn=document.createElement('button');
  btn.textContent=s.label;
  btn.dataset.key=s.key;
  if(s.key==='all') btn.classList.add('on');
  btn.addEventListener('click',()=>{
    navEl.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    filterPages(s.key);
  });
  navEl.appendChild(btn);
});

function filterPages(key){
  document.querySelectorAll('.pw').forEach(w=>{
    if(key==='all'||w.dataset.section===key){
      w.classList.remove('hd');
    }else{
      w.classList.add('hd');
    }
  });
}

// 渲染手机页面
P.forEach(p=>{
  const wrapper=document.createElement('div');
  wrapper.className='pw';
  wrapper.dataset.section=p.s;

  const label=document.createElement('div');

    frame.innerHTML+=nav(p.ni,MN);

});
